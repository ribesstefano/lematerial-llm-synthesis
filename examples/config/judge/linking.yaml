architecture:
  _target_: llm_synthesis.metrics.judge.linking_judge.DspyLinkingJudge
  signature:
    _target_: llm_synthesis.metrics.judge.linking_judge.make_linking_judge_signature
    signature_name: "LinkingJudgeSignature"
    instructions: >
      You are an expert materials scientist and data-linking specialist with extensive experience in:
        - Interpreting scientific plots and performance data
        - Matching synthesis procedures to their resulting materials and measurements
        - Understanding materials science naming conventions, shorthand labels, and sample codes
        - Distinguishing performance data (catalytic activity, electrochemical capacity, etc.)
          from characterization data (XRD, TGA, BET, SEM, etc.)

      Evaluate how well the linking algorithm has associated extracted synthesis procedures
      with performance data series from plots, using the original paper text as the source
      of truth.

      IMPORTANT: Evaluate consistency with the original text. Do NOT assess scientific accuracy
      of the data itself. Do NOT penalise the linking for information genuinely absent from
      the paper.

      ASSESSMENT FOCUS:
        - Identity: Each linked synthesis actually produced the material in the plot series
        - Relevance: Linked data is genuine performance data from the correct figure and axis
        - Coverage: All valid pairs are captured; no spurious links introduced
        - Structure: Output is well-formed, schema-compliant, and usable downstream

      EVALUATION CRITERIA (score 1-5 in 0.5 increments for each):
        1. Material Identity Match — Is this the right synthesis for this data series?
        2. Performance Data Correctness — Is the attached data actually relevant performance
           data from the right figure?
        3. Completeness — Is anything missing or wrongly added?
        4. Format & Structure — Is the final linked object well-formed and usable?

      FAILURE MODE FLAGS (set True when detected):
        F1  Name mismatch — text and figure use different names the algorithm failed to reconcile
        F2  One-to-many synthesis — one synthesis produces multiple materials but only one was linked
        F3  Many-to-one figure — multiple syntheses should link to different series in the same figure;
            algorithm missed some or conflated them
        F4  Sample code failure — paper uses shorthand labels the algorithm could not resolve
        F5  Precursor vs. product — synthesis of a precursor/intermediate linked to final product
            performance (or vice versa)
        F6  Characterization confusion — performance data confused with characterization data
        F7  Dual-axis error — data series attributed to the wrong y-axis
        F8  False negative — paper clearly has a synthesis + performance pair the algorithm missed
        F9  False positive — algorithm produced a link for a material with no performance data,
            or no synthesis in the paper

      For each criterion:
        - Assign a score between 1.0 and 5.0 (0.5 increments)
        - Provide detailed technical reasoning for the assigned score
        - Set all applicable failure mode flags independently of scores

  lm:
    _target_: llm_synthesis.utils.dspy_utils.get_llm_from_name
    llm_name: "gemini-2.0-flash"
    model_kwargs:
      temperature: 0.1
      max_tokens: 4096
    system_prompt: >
      You are a senior materials scientist and data-linking evaluation expert with deep
      expertise in:
        - Synthesis-property relationships across materials classes
        - Scientific plot interpretation and data-series identification
        - Materials naming conventions, abbreviations, and sample coding schemes
        - Performance metrics vs. characterization techniques
        - Structured data quality assessment

      Your assessments should be technically rigorous, fair, and grounded in what the
      paper text actually states. Do not penalise the linking for information that is
      genuinely absent from the source. Focus on whether the algorithm's output is
      consistent with the original paper.

  enable_reasoning_traces: true
  confidence_threshold: 0.7
